name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/jotihunt

            echo "--- Backing up database ---"
            cp backend/database/jotihunt.db /tmp/jotihunt_backup.db 2>/dev/null || true
            git checkout -- backend/database/jotihunt.db 2>/dev/null || true

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Restoring database if git removed it ---"
            if [ ! -f backend/database/jotihunt.db ] && [ -f /tmp/jotihunt_backup.db ]; then
              cp /tmp/jotihunt_backup.db backend/database/jotihunt.db
            fi

            echo "--- Building backend ---"
            cd backend
            # --include=dev forces devDependencies (typescript + @types/*) to
            # install even when NODE_ENV=production, otherwise `npm run build`
            # (tsc) fails to resolve types and set -e aborts the whole deploy.
            npm ci --include=dev
            npm run build
            npm run db:migrate
            cd ..

            echo "--- Building frontend ---"
            cd frontend
            npm ci --include=dev
            npm run build
            cd ..

            echo "--- Restarting backend ---"
            # Restart if it already exists (fork mode, single instance); start
            # it fresh otherwise. Never use cluster mode: multiple workers each
            # open the SQLite file and run the sync cron, causing lock contention.
            pm2 restart jotihunt-backend --update-env || pm2 start backend/dist/server.js --name jotihunt-backend
            pm2 save

            echo "--- Deploy complete ---"
