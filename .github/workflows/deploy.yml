name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/jotihunt

            echo "--- Backing up database ---"
            cp backend/database/jotihunt.db /tmp/jotihunt_backup.db 2>/dev/null || true

            echo "--- Syncing code to origin/main ---"
            # Hard reset instead of `git pull`: the server rebuilds dist/ during
            # deploy, so a merge pull always conflicts on those (now-untracked)
            # build artifacts. fetch + reset --hard force the working tree to
            # match origin and is never blocked by local build output or by
            # untracked SQLite runtime files (*.db-wal/-shm). The DB is gitignored
            # so reset does not touch it; the backup above is a safety net.
            git fetch origin main
            git reset --hard origin/main

            echo "--- Restoring database if missing ---"
            if [ ! -f backend/database/jotihunt.db ] && [ -f /tmp/jotihunt_backup.db ]; then
              cp /tmp/jotihunt_backup.db backend/database/jotihunt.db
            fi

            echo "--- Building backend ---"
            cd backend
            # Use `npm install` (in-place), NOT `npm ci`. npm ci deletes
            # node_modules up front, so if any later step fails under set -e the
            # running app is left with missing modules (MODULE_NOT_FOUND crash
            # loop). --include=dev forces typescript + @types/* so tsc can build.
            npm install --include=dev --no-audit --no-fund
            npm run build
            npm run db:migrate
            cd ..

            echo "--- Building frontend ---"
            cd frontend
            npm install --include=dev --no-audit --no-fund
            npm run build
            cd ..

            echo "--- Restarting backend ---"
            # Restart if it already exists (fork mode, single instance); start
            # it fresh otherwise. Never use cluster mode: multiple workers each
            # open the SQLite file and run the sync cron, causing lock contention.
            pm2 restart jotihunt-backend --update-env || pm2 start backend/dist/server.js --name jotihunt-backend
            pm2 save

            echo "--- Deploy complete ---"
