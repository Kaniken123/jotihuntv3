name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/jotihunt

            echo "--- Backing up database ---"
            cp backend/database/jotihunt.db /tmp/jotihunt_backup.db 2>/dev/null || true
            git checkout -- backend/database/jotihunt.db 2>/dev/null || true

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Restoring database if git removed it ---"
            if [ ! -f backend/database/jotihunt.db ] && [ -f /tmp/jotihunt_backup.db ]; then
              cp /tmp/jotihunt_backup.db backend/database/jotihunt.db
            fi

            echo "--- Building backend ---"
            cd backend
            npm ci
            npm run build
            npm run db:migrate
            cd ..

            echo "--- Building frontend ---"
            cd frontend
            npm ci
            npm run build
            cd ..

            echo "--- Restarting backend ---"
            pm2 restart jotihunt-backend

            echo "--- Deploy complete ---"
