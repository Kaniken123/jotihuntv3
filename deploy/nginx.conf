server {
    listen 80;
    server_name jotihunt-gog.nl www.jotihunt-gog.nl;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jotihunt-gog.nl www.jotihunt-gog.nl;

    ssl_certificate /etc/letsencrypt/live/jotihunt-gog.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jotihunt-gog.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/jotihunt/frontend/dist;
    index index.html;

    # Socket.IO WebSocket — must come before /api/ to match path correctly
    location /api/socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API requests
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files served by backend
    location /uploads/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
